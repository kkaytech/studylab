<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Study Dashboard</title>
  <link rel="stylesheet" href="dashb.css" />
</head>
<body>
  <div class="dashboard">
    <main class="main-content">
      <header>
        <button id="darkModeToggle" aria-label="Toggle dark mode">🌙</button>
      </header>

      <!-- Modern Navbar -->
  <nav class="navbar">
    <div class="nav-content">
      <div class="logo">
        <a href="index.html">📚 StudyLab</a>
      </div>
      <ul class="menu-list">
        <div class="icon cancel-btn">
          <i class="fas fa-times">×</i>
        </div>
        <li><a href="index.html" class="active">Home</a></li>
        <li><a href="calendar.html">Calendar</a></li>
      </ul>
      <div class="icon menu-btn">
        <i class="fas fa-bars">☰</i>
      </div>
    </div>
  </nav>

      <section class="cards-container">
        <!-- Pomodoro Timer Card -->
        <article class="card" id="pomodoroCard">
          <h2>Pomodoro Timer</h2>
          <div class="pomodoro-inputs">
            <input type="number" id="pomodoro-minutes" placeholder="Minutes" min="1" />
            <button id="setTimerBtn">Set Timer</button>
          </div>
          <div class="progress-ring-container">
            <svg class="progress-ring" width="120" height="120">
              <circle class="progress-ring__circle" stroke="#CDB599" stroke-width="8" fill="transparent" r="54" cx="60" cy="60"/>
            </svg>
            <div id="timer" aria-live="polite">25:00</div>
          </div>
          <div class="pomodoro-controls">
            <button id="startTimer">Start</button>
            <button id="pauseTimer">Pause</button>
            <button id="resetTimer">Reset</button>
            <button id="shortBreak">5 min Break</button>
            <button id="longBreak">15 min Break</button>
          </div>
        </article>

        <!-- Bottom Section for To-Do & Goals -->
        <section class="bottom-section">
          <!-- To-Do Box -->
          <article class="card todo-card">
            <h2>To-Do List</h2>
            <ul id="todo-list"></ul>
            <input type="text" id="todo-input" placeholder="Add a task..." />
            <select id="priority-select">
              <option value="low">Low </option>
              <option value="medium">Medium </option>
              <option value="high">High </option>
            </select>
            <button id="add-todo-btn">➕ Add</button>
            <button id="clear-todo-btn">🗑 Clear All</button>
          </article>

          <!-- Goals Box -->
          <article class="card goals-card">
            <h2>Goals</h2>
            <div id="goals-list"></div>
            <input type="text" id="goals-input" placeholder="Add a new goal..." />
            <button id="add-goal-btn">➕ Add Goal</button>
            <button id="clear-goal-btn">🗑 Clear All</button>
          </article>
        </section>

        <!-- Stats Section -->
      <section class="stats-section">
        <div class="card stat-card">
          <div class="stat-value" id="completed-tasks">0</div>
          <div class="stat-label">Tasks Completed</div>
        </div>
        <div class="card stat-card">
          <div class="stat-value" id="study-time">0h 0m</div>
          <div class="stat-label">Study Time Today</div>
        </div>
        <div class="card stat-card">
          <div class="stat-value" id="goals-achieved">0</div>
          <div class="stat-label">Goals Achieved</div>
        </div>
        <div class="card stat-card">
          <div class="stat-value" id="focus-sessions">0</div>
          <div class="stat-label">Focus Sessions</div>
        </div>
      </section>
    </main>
  </div>


  <script src="dashb.js"></script>
</body>
</html>
